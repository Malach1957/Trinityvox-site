<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trinity Vox · Em Breve</title>

<style>
body{
background:#0a0906;
color:#f0ead8;
font-family:Arial,sans-serif;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
margin:0;
}

.box{
max-width:500px;
width:90%;
}

h1{
font-size:42px;
margin-bottom:10px;
}

p{
color:#b9aa8d;
line-height:1.6;
}

.form-label{
display:block;
margin:30px 0 10px;
font-size:12px;
letter-spacing:2px;
text-transform:uppercase;
color:#c9a84c;
}

.form-row{
display:flex;
}

input{
flex:1;
padding:15px;
border:none;
outline:none;
background:#111009;
color:#fff;
font-size:15px;
}

button{
background:#c9a84c;
border:none;
padding:15px 22px;
cursor:pointer;
font-weight:bold;
letter-spacing:2px;
}

.note{
margin-top:10px;
font-size:13px;
color:#8a7f6a;
}
</style>
</head>

<body>

<div class="box">

<h1>Trinity Vox</h1>

<p>
O pânico passa. A clareza salva.<br>
Cadastre seu e-mail e seja avisado no lançamento.
</p>

<form action="https://formsubmit.co/taniaggonzaga@gmail.com" method="POST">

<input type="hidden" name="_captcha" value="false">
<input type="hidden" name="_subject" value="Novo cadastro Trinity Vox">
<input type="hidden" name="_next" value="https://trinityvox.com.br">

<label class="form-label">
QUERO SER AVISADO NO LANÇAMENTO
</label>

<div class="form-row">

<input
type="email"
name="email"
placeholder="seu@email.com"
required
>

<button type="submit">
AVISE-ME
</button>

</div>

<div class="note">
Sem spam. Só o que importa — na hora certa.
</div>

</form>

</div>

</body>
</html>
